<span
  class="icon-wrapper mt-[5px]"
  [class.icon--loading]="isLoading()"
  [class.icon--error]="hasError()"
  [style.width.px]="resolvedWidth()"
  [style.height.px]="resolvedHeight()"
  [style.color]="color()"
  [attr.role]="ariaLabel() ? 'img' : null"
  [attr.aria-label]="ariaLabel() ?? null"
  [attr.aria-hidden]="ariaLabel() ? null : true"
  [title]="ariaLabel() ?? null"
>
  @if (svgContent() && !hasError()) {
    <!-- Rendered SVG -->
    <span class="icon-svg" [innerHTML]="svgContent()"></span>
  }

  @if (isLoading()) {
    <!-- Loading skeleton -->
    <span class="icon-skeleton"></span>
  }

  @if (hasError()) {
    <!-- Error fallback -->
    <svg
      class="icon-error-svg"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <rect x="3" y="3" width="18" height="18" rx="2" />
      <line x1="9" y1="9" x2="15" y2="15" />
      <line x1="15" y1="9" x2="9" y2="15" />
    </svg>
  }
</span>
